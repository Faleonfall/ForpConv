<!doctype html>
<html lang="en">

    />

    <!-- Open Graph / Facebook Social Metadata -->
    <meta property="og:type" content="website" />

      name="twitter:description"

    />

      name="twitter:image"
      content="https://faleonfall.github.io/forpConv/og-image.png"
    />

    <!-- Mobile Web App Experience Settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta

    />
    <meta name="apple-mobile-web-app-title" content="forpConv" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Cross-Origin Isolation Service Worker for ffmpeg.wasm -->

    <!-- Google Fonts Preconnecting & Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <!-- App Root Container with Loading Fallback State -->
    <div id="app">
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background-color: #10151d;
          color: #f4efe7;
          font-family: &quot;Outfit&quot;, sans-serif;
          text-align: center;
          padding: 20px;
        "
      >
        <div
          style="
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;

            animation: spin 1s linear infinite;
            margin-bottom: 20px;
          "
        ></div>
        <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px">
          forpConv
        </h1>
        <p style="color: #c7d2de; font-size: 0.9rem">
          Loading ringtone creator application...
        </p>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>

    <!-- Application Entrypoint -->
    <script type="module" src="/src/main.ts"></script>
  </body>
